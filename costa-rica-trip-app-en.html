<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pura Vida — Costa Rica 2026</title>
<style>
:root{
  --jungle-deep:#132821;
  --jungle:#1F3D31;
  --canopy:#3E6B57;
  --sand:#F3EBDA;
  --paper:#FBF7EE;
  --celeste:#2E9FB0;
  --toucan:#E8622A;
  --ink:#1B1B16;
  --ink-soft:#5B5A4F;
  --line:#E1D6BE;
  --ok:#3E6B57;
  --warn:#C1502E;
  font-size:16px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--sand);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
.serif{font-family:Georgia,"Iowan Old Style","Palatino Linotype",serif;}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}

#app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--sand);}

/* ---- Top bar / trail ---- */
.topbar{
  background:var(--jungle-deep);
  color:var(--paper);
  padding:14px 16px 10px;
  position:sticky;top:0;z-index:20;
}
.topbar-row{display:flex;align-items:baseline;justify-content:space-between;}
.brand{font-family:Georgia,serif;font-size:1.05rem;letter-spacing:.02em;}
.brand b{color:var(--toucan);}
.trip-dates{font-size:.72rem;color:#C9D9CF;opacity:.85;}

.trail{
  display:flex;gap:2px;overflow-x:auto;margin-top:10px;padding-bottom:6px;
  scrollbar-width:none;
}
.trail::-webkit-scrollbar{display:none;}
.trail-stop{
  flex:0 0 auto;padding:5px 10px;border-radius:999px;
  font-size:.68rem;white-space:nowrap;border:1px solid rgba(255,255,255,.18);
  color:#CFE3D8;cursor:pointer;background:transparent;
}
.trail-stop.active{background:var(--toucan);border-color:var(--toucan);color:#fff;font-weight:600;}
.trail-stop.done{opacity:.55;}

/* ---- Tabs ---- */
.tabs{display:flex;background:var(--jungle);}
.tab{flex:1;text-align:center;padding:9px 0;color:#BFD6CB;font-size:.78rem;cursor:pointer;border-bottom:3px solid transparent;}
.tab.active{color:#fff;border-bottom-color:var(--toucan);font-weight:600;}

/* ---- Main scroll area ---- */
main{flex:1;padding:16px 16px 90px;}

.daynum{font-family:Georgia,serif;font-size:2.6rem;line-height:1;color:var(--jungle);}
.dayhead{display:flex;align-items:flex-end;gap:12px;margin-bottom:4px;}
.dayhead .meta{padding-bottom:4px;}
.dayhead .region{font-size:1.05rem;font-weight:700;color:var(--jungle);}
.dayhead .date{font-size:.78rem;color:var(--ink-soft);}

.travelbar{
  display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--celeste);
  background:#E6F4F1;border:1px solid #C9E5E0;padding:6px 10px;border-radius:8px;margin:10px 0 16px;
}

.card{
  background:var(--paper);border:1px solid var(--line);border-radius:12px;
  padding:14px 16px;margin-bottom:14px;
}
.card h3{
  margin:0 0 10px;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;
  color:var(--canopy);font-weight:700;
}

/* Hotel card = ticket stub look */
.hotel-card{position:relative;border-style:dashed;}
.hotel-name{font-family:Georgia,serif;font-size:1.15rem;color:var(--jungle);margin-bottom:2px;}
.hotel-row{display:flex;justify-content:space-between;font-size:.82rem;margin-top:6px;color:var(--ink-soft);}
.hotel-row a{color:var(--celeste);text-decoration:none;}
.hotel-price{font-family:ui-monospace,monospace;font-size:.95rem;color:var(--jungle);font-weight:600;}
.cancel-note{font-size:.72rem;color:var(--warn);margin-top:8px;}

.highlights{font-size:.83rem;color:var(--ink-soft);line-height:1.5;margin-bottom:2px;}
.highlights b{color:var(--ink);}

/* Activities */
.actgroup-label{font-size:.72rem;color:var(--toucan);font-weight:700;margin:10px 0 6px;text-transform:uppercase;letter-spacing:.05em;}
.act{
  display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);
}
.act:last-child{border-bottom:none;}
.act input[type=checkbox]{width:19px;height:19px;margin-top:2px;accent-color:var(--canopy);flex:0 0 auto;}
.act-body{flex:1;}
.act-label{font-size:.9rem;line-height:1.35;}
.act-label.done{color:var(--ink-soft);text-decoration:line-through;}
.act-cost{font-size:.74rem;color:var(--celeste);font-family:ui-monospace,monospace;}
.act-note{font-size:.76rem;color:var(--ink-soft);margin-top:2px;}

.choice-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.choice-pill{
  border:1px solid var(--canopy);color:var(--canopy);background:transparent;
  border-radius:999px;padding:6px 12px;font-size:.78rem;cursor:pointer;
}
.choice-pill.selected{background:var(--canopy);color:#fff;}

/* Budget form */
.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.budget-field label{display:block;font-size:.7rem;color:var(--ink-soft);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.budget-field input{
  width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:.95rem;
  font-family:ui-monospace,monospace;background:#fff;
}
.budget-total{margin-top:12px;font-size:.85rem;display:flex;justify-content:space-between;font-weight:700;color:var(--jungle);}

textarea.notes{
  width:100%;min-height:64px;border:1px solid var(--line);border-radius:8px;padding:10px;
  font-size:.87rem;font-family:inherit;resize:vertical;background:#fff;
}

/* Bottom nav */
.bottomnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:640px;
  background:var(--jungle-deep);display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;z-index:30;
}
.navbtn{background:var(--canopy);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:.85rem;cursor:pointer;}
.navbtn:disabled{opacity:.3;}
.navcenter{color:#C9D9CF;font-size:.78rem;cursor:pointer;text-align:center;}

/* Dashboard */
.dash-stat{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--line);}
.dash-stat:last-child{border-bottom:none;}
.dash-stat .label{font-size:.82rem;color:var(--ink-soft);}
.dash-stat .val{font-family:ui-monospace,monospace;font-weight:700;color:var(--jungle);}
.bar-row{display:flex;align-items:center;gap:8px;font-size:.72rem;margin-bottom:6px;}
.bar-row .lbl{width:64px;flex:0 0 auto;color:var(--ink-soft);}
.bar-track{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;background:var(--celeste);}
.bar-row .amt{width:56px;text-align:right;font-family:ui-monospace,monospace;flex:0 0 auto;}

.daygrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.daygrid .g{
  aspect-ratio:1;border-radius:8px;background:var(--paper);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:.75rem;cursor:pointer;position:relative;
}
.daygrid .g.done{background:var(--canopy);color:#fff;border-color:var(--canopy);}
.daygrid .g.current{outline:2px solid var(--toucan);}

.setting-row{display:flex;gap:8px;align-items:center;margin-top:8px;}
.setting-row input{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:ui-monospace,monospace;}
.smallbtn{background:var(--jungle);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:.78rem;cursor:pointer;}
.smallbtn.outline{background:transparent;color:var(--jungle);border:1px solid var(--jungle);}

.footer-note{font-size:.7rem;color:var(--ink-soft);text-align:center;padding:16px 0 4px;}
</style>
</head>

const STORE_KEY = "crtrip_v1";
function loadStore(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {checks:{}, choices:{}, budget:{}, notes:{}, settings:{target: 2000}};
}

function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(STORE)); }

    const btn = document.createElement("button");
    btn.className = "trail-stop"+(isActive?" active":"")+(allDone && !isActive?" done":"");
    btn.textContent = r;
    btn.onclick = ()=>{ currentDay = firstDay; view="day"; render(); };
    trail.appendChild(btn);
  });
  return div;
}

function renderTabs(){
  const div = document.createElement("div");
  div.className = "tabs";
  div.innerHTML = `
    <div class="tab ${view==='day'?'active':''}" data-t="day">📅 Day</div>
    <div class="tab ${view==='dashboard'?'active':''}" data-t="dashboard">📊 Summary</div>
  `;
  div.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ view = t.dataset.t; render(); };
  });
  return div;
}

function isDayDone(day){
  const d = DAYS[day-1];
  if(!d.activities || d.activities.length===0) return false;
  return d.activities.every((a,i)=> STORE.checks[actKey(day,i)]);
}

function dayBudget(day){
  const b = STORE.budget[day] || {food:0,activities:0,transport:0,other:0};
  return b;
}
function dayTotal(day){
  const b = dayBudget(day);
  return (+b.food||0)+(+b.activities||0)+(+b.transport||0)+(+b.other||0);
}
function tripTotal(){
  let t=0; for(let i=1;i<=27;i++) t+=dayTotal(i); return t;
}
function categoryTotal(cat){
  let t=0; for(let i=1;i<=27;i++) t+=(+dayBudget(i)[cat]||0); return t;
}

function renderDay(day){
  const d = DAYS[day-1];
  const wrap = document.createElement("div");

  wrap.innerHTML = `
    <div class="dayhead">
      <div class="daynum">${String(d.day).padStart(2,"0")}</div>
      <div class="meta">
        <div class="region">${d.region}</div>
        <div class="date">${d.date} 2026</div>
      </div>
    </div>
  `;

  if(d.travel){
    const tb = document.createElement("div");
    tb.className = "travelbar";
    tb.innerHTML = `🚗 ${d.travel.from} → ${d.travel.to} · ${d.travel.dur}${d.travel.dist!=="—"?" · "+d.travel.dist:""}`;
    wrap.appendChild(tb);
  }

  if(d.hotel){
    const hc = document.createElement("div");
    hc.className = "card hotel-card";
    hc.innerHTML = `
      <h3>🏨 Accommodation</h3>
      <div class="hotel-name">${d.hotel.name}</div>
      <div class="hotel-row"><span>${d.hotel.loc}</span></div>
      <div class="hotel-row"><a href="tel:${d.hotel.phone.replace(/\\s+/g,'')}">${d.hotel.phone}</a><span class="hotel-price">${d.hotel.price}</span></div>
      ${d.hotel.conf && d.hotel.conf!=="—" ? `<div class="hotel-row"><span>Confirmation #</span><span class="mono">${d.hotel.conf}</span></div>` : ""}
      <div class="cancel-note">⚠ ${d.hotel.cancel}</div>
    `;
    wrap.appendChild(hc);
  }

  if(d.highlights){
    const hi = document.createElement("div");
    hi.className = "card";
    hi.innerHTML = `<h3>📍 Good to know</h3><div class="highlights">${d.highlights}</div>`;
    wrap.appendChild(hi);
  }

  // Activities
  const ac = document.createElement("div");
  ac.className = "card";
  ac.innerHTML = `<h3>✅ Today's activities</h3>`;
  const groups = {};
  const singles = [];
  (d.activities||[]).forEach((a,i)=>{
    if(a.group){ (groups[a.group] = groups[a.group]||[]).push({...a, idx:i}); }
    else singles.push({...a, idx:i});
  });

  Object.keys(groups).forEach(g=>{
    const items = groups[g];
    const label = document.createElement("div");
    label.className = "actgroup-label";
    label.textContent = "Choose one";
    ac.appendChild(label);
    const row = document.createElement("div");
    row.className = "choice-row";
    items.forEach(it=>{
      const pill = document.createElement("button");
      const selected = STORE.choices[g+"_"+day] === it.idx;
      pill.className = "choice-pill"+(selected?" selected":"");
      pill.textContent = it.label + (it.cost?" · "+it.cost:"");
      pill.onclick = ()=>{ STORE.choices[g+"_"+day] = it.idx; save(); render(); };
      row.appendChild(pill);
    });
    ac.appendChild(row);
    // show checkbox only for the selected option
    const selIdx = STORE.choices[g+"_"+day];
    if(selIdx !== undefined){
      const chosen = items.find(it=>it.idx===selIdx);
      ac.appendChild(renderActRow(day, chosen));
    }
  });

  singles.forEach(a=>{
    ac.appendChild(renderActRow(day, a));
  });

  if(!d.activities || d.activities.length===0){
    ac.innerHTML += `<div class="highlights">Nothing planned \u2014 free day / transit.</div>`;
  }
  wrap.appendChild(ac);

  // Budget
  const bud = document.createElement("div");
  bud.className = "card";
  const b = dayBudget(day);
  bud.innerHTML = `
    <h3>💵 Today's expenses (USD)</h3>
    <div class="budget-grid">
      <div class="budget-field"><label>Food</label><input type="number" min="0" step="0.01" data-cat="food" value="${b.food||''}" placeholder="0"></div>
      <div class="budget-field"><label>Activities</label><input type="number" min="0" step="0.01" data-cat="activities" value="${b.activities||''}" placeholder="0"></div>
      <div class="budget-field"><label>Transport</label><input type="number" min="0" step="0.01" data-cat="transport" value="${b.transport||''}" placeholder="0"></div>
      <div class="budget-field"><label>Other</label><input type="number" min="0" step="0.01" data-cat="other" value="${b.other||''}" placeholder="0"></div>
    </div>
    <div class="budget-total"><span>Day total</span><span>$${dayTotal(day).toFixed(2)}</span></div>
  `;
  bud.querySelectorAll("input").forEach(inp=>{
    inp.oninput = ()=>{
      STORE.budget[day] = STORE.budget[day] || {};
      STORE.budget[day][inp.dataset.cat] = inp.value;
      save();
      bud.querySelector(".budget-total span:last-child").textContent = "$"+dayTotal(day).toFixed(2);
    };
  });
  wrap.appendChild(bud);

  // Notes
  const nt = document.createElement("div");
  nt.className = "card";
  nt.innerHTML = `<h3>📝 Notes</h3><textarea class="notes" placeholder="Impressions, tips, changes of plan...">${STORE.notes[day]||""}</textarea>`;
  nt.querySelector("textarea").oninput = (e)=>{ STORE.notes[day]=e.target.value; save(); };
  wrap.appendChild(nt);

  return wrap;
}

function renderActRow(day, a){
  const row = document.createElement("div");
  row.className = "act";
  const key = actKey(day, a.idx);
  const checked = !!STORE.checks[key];
  row.innerHTML = `
    <input type="checkbox" ${checked?"checked":""}>
    <div class="act-body">
      <div class="act-label ${checked?'done':''}">${a.label}</div>
      ${a.note?`<div class="act-note">${a.note}</div>`:""}
      ${a.cost?`<div class="act-cost">${a.cost}</div>`:""}
    </div>
  `;
  row.querySelector("input").onchange = (e)=>{
    STORE.checks[key] = e.target.checked;
    save();
    row.querySelector(".act-label").classList.toggle("done", e.target.checked);
  };
  return row;
}

function renderDashboard(){
  const wrap = document.createElement("div");

  const doneCount = DAYS.filter(d=>isDayDone(d.day)).length;
  const spent = tripTotal();
  const target = STORE.settings.target || 0;

  const s1 = document.createElement("div");
  s1.className = "card";
  s1.innerHTML = `
    <h3>Overview</h3>
    <div class="dash-stat"><span class="label">Days completed</span><span class="val">${doneCount} / 27</span></div>
    <div class="dash-stat"><span class="label">Accommodation (prepaid)</span><span class="val">$${ACCOMMODATION_TOTAL.toFixed(2)}</span></div>
    <div class="dash-stat"><span class="label">Daily expenses logged</span><span class="val">$${spent.toFixed(2)}</span></div>
    <div class="dash-stat"><span class="label">Estimated trip total</span><span class="val">$${(spent+ACCOMMODATION_TOTAL).toFixed(2)}</span></div>
    <div class="dash-stat"><span class="label">Daily budget target</span><span class="val">$${target.toFixed(2)}</span></div>
    <div class="dash-stat"><span class="label">Remaining vs target</span><span class="val" style="color:${spent>target?'var(--warn)':'var(--ok)'}">$${(target-spent).toFixed(2)}</span></div>
    <div class="setting-row">
      <input type="number" id="targetInput" value="${target}" placeholder="Total daily budget ($)">
      <button class="smallbtn" id="setTarget">Set</button>
    </div>
  `;
  wrap.appendChild(s1);
  s1.querySelector("#setTarget").onclick = ()=>{
    STORE.settings.target = +s1.querySelector("#targetInput").value || 0;
    save(); render();
  };

  const s2 = document.createElement("div");
  s2.className = "card";
  s2.innerHTML = `<h3>By category</h3>`;
  const cats = [["food","Food"],["activities","Activities"],["transport","Transport"],["other","Other"]];
  const maxCat = Math.max(1, ...cats.map(c=>categoryTotal(c[0])));
  cats.forEach(([key,label])=>{
    const val = categoryTotal(key);
    const row = document.createElement("div");
    row.className = "bar-row";
    row.innerHTML = `<div class="lbl">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${(val/maxCat*100)||0}%"></div></div><div class="amt">$${val.toFixed(0)}</div>`;
    s2.appendChild(row);
  });
  wrap.appendChild(s2);

  const s3 = document.createElement("div");
  s3.className = "card";
  s3.innerHTML = `<h3>All days</h3><div class="daygrid" id="dg"></div>`;
  wrap.appendChild(s3);
  const dg = s3.querySelector("#dg");
  DAYS.forEach(d=>{
    const g = document.createElement("div");
    g.className = "g"+(isDayDone(d.day)?" done":"")+(d.day===currentDay?" current":"");
    g.textContent = d.day;
    g.onclick = ()=>{ currentDay = d.day; view="day"; render(); };
    dg.appendChild(g);
  });

  const s4 = document.createElement("div");
  s4.className = "card";
  s4.innerHTML = `
    <h3>Backup</h3>
    <div class="highlights">This data stays only on this device (localStorage). Export a backup copy regularly.</div>
    <div class="setting-row">
      <button class="smallbtn" id="exportBtn">⬇ Export (.json)</button>
      <button class="smallbtn outline" id="importBtn">⬆ Import</button>
    </div>
    <input type="file" id="fileInput" accept="application/json" style="display:none">
  `;
  wrap.appendChild(s4);
  s4.querySelector("#exportBtn").onclick = ()=>{
    const blob = new Blob([JSON.stringify(STORE,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "costa-rica-trip-backup.json";
    a.click();
    URL.revokeObjectURL(url);
  };
  const fileInput = s4.querySelector("#fileInput");
  s4.querySelector("#importBtn").onclick = ()=> fileInput.click();
  fileInput.onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        STORE = JSON.parse(reader.result);
        save(); render();
      }catch(err){ alert("Invalid file."); }
    };
    reader.readAsText(file);
  };

  return wrap;
}

function renderBottomNav(){
  const div = document.createElement("div");
  div.className = "bottomnav";
  if(view === "day"){
    div.innerHTML = `
      <button class="navbtn" id="prevBtn" ${currentDay<=1?"disabled":""}>◀ Day ${currentDay-1}</button>
      <div class="navcenter" id="gridBtn">Day ${currentDay} / 27</div>
      <button class="navbtn" id="nextBtn" ${currentDay>=27?"disabled":""}>Day ${currentDay+1} ▶</button>
    `;
    div.querySelector("#prevBtn").onclick = ()=>{ if(currentDay>1){currentDay--; render();} };
    div.querySelector("#nextBtn").onclick = ()=>{ if(currentDay<27){currentDay++; render();} };
    div.querySelector("#gridBtn").onclick = ()=>{ view="dashboard"; render(); };
  } else {
    div.innerHTML = `<div class="navcenter" style="width:100%;text-align:center;">Trip summary \u2014 tap a day to go back</div>`;
  }
  return div;
}

render();
</script>
</body>
</html>
